<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="logoGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#5ABA9A"/>
      <stop offset="50%" stop-color="#7DD3C0"/>
      <stop offset="100%" stop-color="#4ECDC4"/>
    </linearGradient>
    <linearGradient id="glassGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="rgba(255,255,255,0.25)"/>
      <stop offset="100%" stop-color="rgba(255,255,255,0.05)"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="8" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <clipPath id="hexClip">
      <polygon points="256,40 450,148 450,364 256,472 62,364 62,148"/>
    </clipPath>
  </defs>

  <!-- Background hexagon -->
  <polygon
    points="256,40 450,148 450,364 256,472 62,364 62,148"
    fill="#0A0A0D"
    stroke="url(#logoGradient)"
    stroke-width="3"
  />

  <!-- Inner glass effect -->
  <polygon
    points="256,70 420,163 420,349 256,442 92,349 92,163"
    fill="url(#glassGradient)"
  />

  <!-- Vitree symbol - crystalline V shape representing clarity -->
  <g filter="url(#glow)">
    <!-- Main V prism -->
    <path
      d="M160,140 L256,360 L352,140 L320,140 L256,300 L192,140 Z"
      fill="url(#logoGradient)"
    />

    <!-- Light refraction lines suggesting transparency -->
    <line x1="200" y1="180" x2="256" y2="320" stroke="rgba(255,255,255,0.4)" stroke-width="2"/>
    <line x1="312" y1="180" x2="256" y2="320" stroke="rgba(255,255,255,0.4)" stroke-width="2"/>

    <!-- Top accent bar -->
    <rect x="170" y="120" width="172" height="8" rx="4" fill="url(#logoGradient)" opacity="0.7"/>

    <!-- Bottom reflection dot -->
    <circle cx="256" cy="380" r="12" fill="url(#logoGradient)" opacity="0.5"/>
  </g>
</svg>